<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Yélé — Tourisme Côte d'Ivoire</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/livekit-client@2.11.3/dist/livekit-client.umd.min.js"></script>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>

    <!-- WELCOME SCREEN -->
    <div class="welcome-screen" id="welcomeScreen">

      <!-- Header logos -->
      <div class="welcome-header">
        <img src="/images/ministere.jpeg" alt="Ministère du Tourisme" class="logo-img" />
        <img src="/images/sublime.jpeg" alt="Sublime Côte d'Ivoire" class="logo-img" />
      </div>

      <!-- Avatar + gradient background -->
      <div class="welcome-hero">
        <img src="/images/yele.png" alt="Yélé" class="yele-img" />
        <div class="welcome-overlay">
          <div class="welcome-text">
            <h1 id="welcomeLine1">Je suis Yélé, votre</h1>
            <h1 class="bold" id="welcomeLine2">guide culturel IA</h1>
            <p id="welcomeDesc">Je réponds à toutes vos questions sur<br>la Côte d'Ivoire instantanément.</p>
          </div>
          <div class="welcome-actions">
            <div class="lang-selector">
              <button class="lang-btn active" onclick="setLanguage('fr', this)">FR</button>
              <button class="lang-btn" onclick="setLanguage('en', this)">EN</button>
              <button class="lang-btn" onclick="setLanguage('zh', this)">中文</button>
            </div>
            <div class="cta-buttons">
              <button id="startWelcomeBtn" class="cta-start" onclick="startSession()">
                Commencer la discussion
              </button>
            </div>
          </div>
        </div>
      </div>

    </div>

    <!-- SESSION SCREEN (hidden until session starts) -->
    <div class="session-screen" id="sessionScreen" style="display: none;">

      <div class="session-header">
        <div class="status-indicator">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusText">Disconnected</span>
        </div>
        <div class="lang-selector">
          <button class="lang-btn active" onclick="setLanguage('fr', this)">FR</button>
          <button class="lang-btn" onclick="setLanguage('en', this)">EN</button>
          <button class="lang-btn" onclick="setLanguage('zh', this)">中文</button>
        </div>
        <button id="closeBtn" class="header-btn">End Session</button>
      </div>

      <div class="video-container">
        <video id="mediaElement" autoplay playsinline></video>
      </div>

      <div class="input-container">
        <div class="input-wrapper">
          <textarea id="taskInput" class="input-field" placeholder="Écrivez votre message ici..." rows="1" disabled></textarea>
          <div class="input-buttons">
            <button id="micBtn" class="send-btn secondary" title="Voice Input" disabled>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                <line x1="12" y1="19" x2="12" y2="23"/>
                <line x1="8" y1="23" x2="16" y2="23"/>
              </svg>
            </button>
            <button id="talkBtn" class="send-btn" disabled>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
            </button>
          </div>
        </div>
      </div>

    </div>

    <script src="/js/app.js"></script>
  </body>
</html>
